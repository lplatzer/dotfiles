force_keyboard_focus = true
selection_wrap       = true

[providers]
max_results = 256
default     = ["desktopapplications", "websearch"]

[[providers.prefixes]]
prefix   = "$"
provider = "clipboard"

[[providers.prefixes]]
prefix   = "."
provider = "files"

[[providers.prefixes]]
prefix   = "="
provider = "calc"

[[providers.prefixes]]
prefix   = "@"
provider = "websearch"

[[emergencies]]
text    = "Restart Walker"
command = "walker"
