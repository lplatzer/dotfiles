force_keyboard_focus = true
selection_wrap       = true

[providers]
max_results = 50
default     = ["desktopapplications"]

[[providers.prefixes]]
prefix   = ";"
provider = "providerlist"

[[providers.prefixes]]
prefix   = ">"
provider = "runner"

[[providers.prefixes]]
prefix   = "/"
provider = "files"

[[providers.prefixes]]
prefix   = "="
provider = "calc"

[[providers.prefixes]]
prefix   = "@"
provider = "websearch"

[[providers.prefixes]]
prefix   = ":"
provider = "clipboard"

[[providers.prefixes]]
prefix   = "$"
provider = "windows"
