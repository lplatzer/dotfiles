general {
    disable_loading_bar = false
    grace               = 0
    hide_cursor         = true
    no_fade_in          = false
}

background {
    monitor =
    path    = screenshot
    blur_passes = 2
    blur_size   = 4
    brightness  = 0.75
}

input-field {
    monitor =
    size             = 220, 50
    outline_thickness = 3
    outer_color      = rgb(33ccff)
    inner_color      = rgb(1a1b26)
    font_color       = rgb(c0caf5)
    placeholder_text = <i>Password...</i>
    check_color      = rgb(9ece6a)
    fail_color       = rgb(f7768e)
    fail_text        = <i>$FAIL ($ATTEMPTS)</i>
    rounding         = 8
    position         = 0, -20
    halign           = center
    valign           = center
}

label {
    monitor     =
    text        = $TIME
    color       = rgba(c0caf5, 1.0)
    font_size   = 55
    font_family = JetBrainsMono Nerd Font
    position    = 0, 300
    halign      = center
    valign      = center
}
