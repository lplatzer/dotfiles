# Hyprland keybinds — the Linux half of a cross-platform tiling setup.
# Mirrors ~/.aerospace.toml on macOS. Sourced from hyprland.conf.
#
# Unified mod key: ALT (same physical key + behaviour as AeroSpace on macOS).
# Launcher lives on SUPER+Space (mirroring Alfred on Cmd+Space) — deliberately a
# different modifier from $mod so a custom keyboard remap of Cmd/Super+Space
# stays correct across both machines.

$mod = ALT

# ── Apps ─────────────────────────────────────────────────────────────────────
bind = $mod, Return, exec, ghostty                 # terminal
bind = SUPER, Space, exec, walker                  # launcher (mirrors Cmd+Space / Alfred)

# ── Window operations (mirror AeroSpace) ─────────────────────────────────────
bind = $mod, Q, killactive                         # alt-q  = close
bind = $mod, F, fullscreen, 0                       # alt-f  = fullscreen
bind = $mod SHIFT, Space, togglefloating            # alt-shift-space = float/tile
bind = $mod, comma, pseudo                          # alt-comma ~ accordion-ish (dwindle pseudotile)
bind = $mod, slash, togglesplit                     # alt-slash ~ toggle orientation (dwindle)

# ── Focus (vim h/j/k/l) ──────────────────────────────────────────────────────
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

# ── Move window ──────────────────────────────────────────────────────────────
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r

# ── Resize (held repeat) ─────────────────────────────────────────────────────
binde = $mod, minus, resizeactive, -50 0
binde = $mod, equal, resizeactive,  50 0

# ── Workspaces 1-10 ──────────────────────────────────────────────────────────
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# ── Move focused window to workspace ─────────────────────────────────────────
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# ── Workspace navigation ─────────────────────────────────────────────────────
bind = $mod, Tab, workspace, previous                       # back-and-forth
bind = $mod SHIFT, Tab, movecurrentworkspacetomonitor, +1   # bounce to next monitor

# ── Mouse (drag to move/resize) ──────────────────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Hyprland-specific (no AeroSpace equivalent) ──────────────────────────────
bind = $mod SHIFT, E, exit                          # quit Hyprland
# bind = $mod, Escape, exec, hyprlock               # lock (needs hyprlock)
# bind = , Print, exec, grim -g "$(slurp)" - | wl-copy   # region screenshot (needs grim+slurp)

# Media / brightness keys (uncomment if you have the tools installed)
# bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
# bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
# bindl  = , XF86AudioMute,         exec, wpctl set-mute   @DEFAULT_AUDIO_SINK@ toggle
# bindel = , XF86MonBrightnessUp,   exec, brightnessctl s 5%+
# bindel = , XF86MonBrightnessDown, exec, brightnessctl s 5%-
