# Hyprland — main config (Linux/CachyOS only; gated in .chezmoiignore).
# Keybindings live in keybinds.conf and mirror ~/.aerospace.toml on macOS.
# Docs: https://wiki.hypr.land

# ── Monitors ─────────────────────────────────────────────────────────────────
# Default: every monitor at preferred resolution, auto-placed, scale 1.
# Override per-display, e.g.: monitor = DP-1, 2560x1440@144, 0x0, 1
# Inspect connected outputs with: hyprctl monitors
monitor = , preferred, auto, 1

# ── Environment ──────────────────────────────────────────────────────────────
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# ── Autostart ────────────────────────────────────────────────────────────────
# Walker as a background service -> instant launcher startup.
exec-once = walker --gapplication-service
# Clipboard history (feeds walker's clipboard module — your Alfred clipboard parity).
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# exec-once = waybar          # status bar (install separately if wanted)

# ── Look & feel ──────────────────────────────────────────────────────────────
general {
    gaps_in = 8
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(89b4faee) rgba(74c7ecee) 45deg
    col.inactive_border = rgba(313244aa)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 8
    blur {
        enabled = true
        size = 4
        passes = 2
    }
    shadow {
        enabled = true
        range = 12
        render_power = 3
    }
}

animations {
    enabled = true
    bezier = ease, 0.25, 0.1, 0.25, 1.0
    animation = windows,     1, 4, ease
    animation = windowsOut,  1, 4, ease, popin 80%
    animation = border,      1, 8, default
    animation = fade,        1, 4, ease
    animation = workspaces,  1, 4, ease, slide
}

# dwindle = Hyprland's spiral/BSP layout (closest analogue to AeroSpace tiles).
dwindle {
    pseudotile = true
    preserve_split = true
}

# ── Input ────────────────────────────────────────────────────────────────────
input {
    # ZSA boards (Moonlander/Voyager) emit US by default — change if your layer
    # produces a different layout, or set kb_layout = de for a stock DE board.
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
    }
}

gestures {
    workspace_swipe = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# ── Keybindings ──────────────────────────────────────────────────────────────
source = ~/.config/hypr/keybinds.conf
